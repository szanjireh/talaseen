name: Deploy to Server

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
  workflow_run:
    workflows: ["CD Pipeline - Build and Push"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: Deploy to ${{ github.event.inputs.environment || 'production' }}
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    environment: ${{ github.event.inputs.environment || 'production' }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        env:
          HOST: ${{ secrets.SERVER_HOST }}
        run: |
          if [ -z "$HOST" ]; then
            echo "❌ Error: SERVER_HOST secret is empty!"
            exit 1
          fi
          mkdir -p ~/.ssh
          ssh-keyscan -p 3031 -H "$HOST" >> ~/.ssh/known_hosts || echo "Warning: ssh-keyscan failed"

      - name: Deploy to Server
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          # Single quotes around 'ENDSSH' prevent early evaluation of token contexts
          ssh -p 3031 -o StrictHostKeyChecking=accept-new $SERVER_USER@$SERVER_HOST << 'ENDSSH'
            # 1. Enforce strict directory navigation
            cd "${{ secrets.SERVER_PATH }}" || { echo "❌ Error: Target deployment directory not found!"; exit 1; }
            echo "Working Directory Verified: $(pwd)"
            
            # 2. Update local repository files
            git pull origin main
            
            # 3. Authenticate with GHCR
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            
            # 4. Verify Compose existence and download the fresh build layers
            if [ -f "docker-compose.yml" ]; then
              echo "⬇️ Pulling fresh images from GHCR..."
              docker compose pull
              
              echo "🔄 Recreating service containers..."
              docker compose down
              docker compose up -d
              
              echo "🚀 Executing database migrations..."
              docker compose exec -T backend npx prisma migrate deploy
              
              echo "🧹 Cleaning up legacy dangling layers..."
              docker image prune -af
            else
              echo "❌ Error: Missing docker-compose.yml inside target directory."
              exit 1
            fi
            
            echo "Deployment completed successfully!"
          ENDSSH

      - name: Health Check
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          ssh -p 3031 -o StrictHostKeyChecking=accept-new $SERVER_USER@$SERVER_HOST << 'ENDSSH'
            echo "Waiting for backend initialization..."
            sleep 15
            
            # Curl the backend locally inside the server network where port 4000 is accessible
            response=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:4000/api/health || echo "000")
            
            if [ "$response" = "200" ] || [ "$response" = "404" ]; then
              echo "✅ Backend is responding cleanly with status: $response"
            else
              echo "❌ Backend health check failed internally with status: $response"
              exit 1
            fi
          ENDSSH
      - name: Notify Deployment
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ Deployment successful!"
          else
            echo "❌ Deployment failed!"
          fi
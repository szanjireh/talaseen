name: Deploy to Server

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
  workflow_run:
    workflows: ["CD Pipeline - Build and Push"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: Deploy to ${{ github.event.inputs.environment || 'production' }}
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    environment: ${{ github.event.inputs.environment || 'production' }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        env:
          HOST: ${{ secrets.SERVER_HOST }}
        run: |
          if [ -z "$HOST" ]; then
            echo "❌ Error: SERVER_HOST secret is empty!"
            exit 1
          fi
          mkdir -p ~/.ssh
          ssh-keyscan -p 3031 -H "$HOST" >> ~/.ssh/known_hosts || echo "Warning: ssh-keyscan failed"

      - name: Deploy to Server
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          ssh -p 3031 -o StrictHostKeyChecking=accept-new $SERVER_USER@$SERVER_HOST << 'ENDSSH'
            cd ${{ secrets.SERVER_PATH }}
            git pull origin main
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            docker compose pull
            docker compose down
            docker compose up -d
            docker compose exec -T backend npx prisma migrate deploy
            docker image prune -af
            echo "Deployment completed successfully!"
          ENDSSH

      - name: Health Check
        run: |
          sleep 10
          response=$(curl -s -o /dev/null -w "%{http_code}" http://${{ secrets.SERVER_HOST }}:4000/api/health || echo "000")
          if [ "$response" = "200" ] || [ "$response" = "404" ]; then
            echo "Backend is responding"
          else
            echo "Backend health check failed with status: $response"
            exit 1
          fi

      - name: Notify Deployment
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ Deployment successful!"
          else
            echo "❌ Deployment failed!"
          fi